apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hello-portainer-run-data
  namespace: portainer-addon-portainer-run
  labels:
    app: hello-portainer-run
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: c2a34ef4-6c72-4409-b463-1eae1e3298b9
    portainer-run/git-branch: main
    portainer-run/git-path: local/portainer-addon-portainer-run/hello-portainer-run.yaml
    portainer-run/vibe-source-path: local/portainer-addon-portainer-run/hello-portainer-run/src
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-portainer-run
  namespace: portainer-addon-portainer-run
  labels:
    app: hello-portainer-run
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: c2a34ef4-6c72-4409-b463-1eae1e3298b9
    portainer-run/git-branch: main
    portainer-run/git-path: local/portainer-addon-portainer-run/hello-portainer-run.yaml
    portainer-run/vibe-source-path: local/portainer-addon-portainer-run/hello-portainer-run/src
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-portainer-run
  template:
    metadata:
      labels:
        app: hello-portainer-run
        managed-by: portainer-run
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers:
        - name: vibe-sync
          image: alpine/git:latest
          command:
            - sh
            - '-c'
            - >-
              git config --global http.sslVerify false && git clone --depth 1 --branch main
              https://${GIT_USERNAME}:${GIT_TOKEN}@github.com/RHCowan/portainer-run-testing /tmp/repo && mkdir -p /app
              && cp -r /tmp/repo/local/portainer-addon-portainer-run/hello-portainer-run/src/. /app/ && rm -rf /tmp/repo
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: app-data
              mountPath: /app
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hello-portainer-run-git-credentials
                  key: username
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hello-portainer-run-git-credentials
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        - name: vibe-install
          image: node:22
          command:
            - sh
            - '-c'
            - cd /app && if [ -f package.json ]; then npm install --production 2>&1; fi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 2Gi
          volumeMounts:
            - name: app-data
              mountPath: /app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        - name: vibe-env
          image: busybox:1.36
          command:
            - sh
            - '-c'
            - printf '%s' 'GREETING=Hello from Portainer-Run!' > /app/.env
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app-data
              mountPath: /app
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: hello-portainer-run
          image: node:22
          command:
            - sh
            - '-c'
            - npm start
          workingDir: /app
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: app-data
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: '1'
              memory: 4Gi
          env:
            - name: GREETING
              value: Hello from Portainer-Run!
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hello-portainer-run-app-secrets
                  key: API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: hello-portainer-run-data
---
apiVersion: v1
kind: Service
metadata:
  name: hello-portainer-run
  namespace: portainer-addon-portainer-run
  labels:
    app: hello-portainer-run
    managed-by: portainer-run
  annotations:
    portainer-run/deploy-type: vibe
    portainer-run/git-target-id: c2a34ef4-6c72-4409-b463-1eae1e3298b9
    portainer-run/git-branch: main
    portainer-run/git-path: local/portainer-addon-portainer-run/hello-portainer-run.yaml
    portainer-run/vibe-source-path: local/portainer-addon-portainer-run/hello-portainer-run/src
spec:
  type: NodePort
  selector:
    app: hello-portainer-run
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
